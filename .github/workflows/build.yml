name: Build Android APK (Local)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './Reloom/package-lock.json'

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Decode Keystore
        env:
          ENCODED_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$ENCODED_KEYSTORE" ]; then
            echo "$ENCODED_KEYSTORE" | base64 --decode > ./Reloom/android-keystore.jks
          else
            echo "Keystore secret not provided, continuing without it."
          fi

      - name: Install dependencies
        working-directory: ./Reloom
        run: npm ci

      - name: Build APK locally
        working-directory: ./Reloom
        env:
          EAS_LOCAL_BUILD_SKIP_CLEANUP: 1
          EXPO_ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          EXPO_ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          EXPO_ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: eas build --platform android --profile preview --local --non-interactive --output ./build/reloom.apk

      - name: Securely Delete Keystore
        if: always()
        run: rm -f ./Reloom/android-keystore.jks

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: reloom-apk
          path: ./Reloom/build/reloom.apk
          retention-days: 7
